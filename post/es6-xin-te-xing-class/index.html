            <div class="post-date">2020-08-03</div>
            
            <div class="post-content" v-pre>
              <p>ES6 提供了更接近传统语言的写法，引入了 class（类）这个概念，作为对象的模板。通过class关键字，可以定义类。</p>
<p>基本上，ES6 的class可以看作只是一个语法糖，它的绝大部分功能，ES5 都可以做到，新的class写法只是让对象原型的写法更加清晰、更像面向对象编程的语法而已。在ES5中，我们更多是使用原型链来实现继承。</p>
