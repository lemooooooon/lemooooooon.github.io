            <div class="post-content" v-pre>
              <p>ES6支持二进制和八进制的字面量，通过在数字前面增加0o或者0O可以将数字转换为八进制。</p>
<pre><code>let val1 = 0o10;
console.log(val1);      // 8，八进制的0o10对应十进制的8

let val2 = 0b10;
console.log(val2);      // 2，二进制的0b10对应十进制的2</code></pre>
